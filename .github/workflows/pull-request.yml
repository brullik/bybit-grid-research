name: Pull Request

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.14']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e .[dev]
      - run: python scripts/check_numeric_environment.py
      - run: python -m pip check
      - run: python scripts/check_no_live_execution.py
      - run: python -m compileall -q src tests scripts
      - run: python scripts/check_behavior_coverage_maps.py --collect-command "python -m pytest --collect-only -q"
      - run: python -m pytest tests/test_sprint_06_4a_3_4_governance_cli.py -q
      - run: python -m pytest tests/test_sprint_06_4a_3_4_schema_plan_writer.py -q
      - run: python -m pytest tests/test_sprint_06_4a_3_4_import_audit.py -q
      - run: python -m pytest tests/test_sprint_06_4a_3_4_replay_coverage_resume_duckdb.py -q
      - run: python -m pytest tests/test_sprint_06_4a_3_4_semantic_pack_cli.py -q
      - run: python -m pytest tests/test_sprint_06_4a_3_6_pr67_regressions.py -q
      - run: python -m pytest tests/test_sprint_06_3b_*.py -q
      - run: python -m pytest -q
      - run: ruff check .
      - run: git diff --check
