          head_forbidden = checked_node_ids(head_result, "forbidden", "head")
          head_passed = checked_node_ids(head_result, "passed", "head")
          if type(head_result["exit_code"]) is not int or head_result["exit_code"] != 1:
              errors.append(f"unexpected_v2_head_pytest_exit:{head_result['exit_code']}")
          if head_forbidden:
              errors.append("v2_forbidden_outcomes=" + ",".join(sorted(head_forbidden)))
          if sorted(head_collected) != sorted(base_collected):
              errors.append("v2_head_vs_base_collection_mismatch")
          if sorted(head_failed + head_passed) != sorted(base_collected):
              errors.append("v2_head_outcome_union_vs_base_collection_mismatch")
          if sorted(head_failed) != sorted(expected_failed):
              errors.append("v2_failed_node_ids_mismatch")
          if sorted(head_passed) != sorted(expected_passed):
              errors.append("v2_passed_node_ids_mismatch")
          if errors:
              raise SystemExit(";".join(errors))
          print(
              json.dumps(
                  {
                      "baseline_collected_count": len(base_collected),
                      "failed_node_ids": sorted(head_failed),
                      "passed_node_ids": sorted(head_passed),
                      "status": "exact-v2-red-manifest-matched",
                  },
                  sort_keys=True,
                  separators=(",", ":"),
              )
          )
          PY
      - name: Stage disposable ordinary execution tree
        env:
          RUNNER_TEMP: ${{ runner.temp }}
        run: |
          test ! -e "$RUNNER_TEMP/ordinary_execution"
          mkdir -p "$RUNNER_TEMP/ordinary_execution"
          cp -R head/. "$RUNNER_TEMP/ordinary_execution/"
      - name: Run supplemental PR checks
        working-directory: head
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_MODE: ${{ needs.protected-paths.outputs.pr-mode }}
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: '1'
          PYTHONDONTWRITEBYTECODE: '1'
          PYTHONPYCACHEPREFIX: ${{ runner.temp }}/pycache
          RUFF_CACHE_DIR: ${{ runner.temp }}/ruff-cache
        run: |
          python scripts/check_numeric_environment.py
          python -m pip check
          python scripts/check_no_live_execution.py
          python -m compileall -q src tests scripts
          python "$RUNNER_TEMP/scripts/check_task_scope.py" \
            --exact-ordinary-root "$RUNNER_TEMP/ordinary_execution"
          ruff check .
          git --no-replace-objects -C ../head_checkout diff --check "$BASE_SHA"..."$HEAD_SHA"
      - name: Verify immutable Git-object snapshots unchanged
        if: ${{ always() }}
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          MATRIX_PYTHON: ${{ matrix.python-version }}
          RUNNER_TEMP: ${{ runner.temp }}
        run: |
          python - <<'PY'
          from __future__ import annotations

          import hashlib
          import json
          import os
          from pathlib import Path
          import stat
          import subprocess

          workspace = Path(os.environ["GITHUB_WORKSPACE"]).resolve()
          inventory_path = Path(os.environ["RUNNER_TEMP"]) / (
              f"pm-object-snapshots-{os.environ['MATRIX_PYTHON']}.json"
          )
          if not inventory_path.is_file() or inventory_path.is_symlink():
              raise SystemExit("snapshot_inventory_missing")
          payload = json.loads(inventory_path.read_text(encoding="utf-8"))
          if not isinstance(payload, dict) or set(payload) != {"base", "head"}:
              raise SystemExit("snapshot_inventory_invalid")

          def git(checkout: Path, *arguments: str) -> bytes:
              result = subprocess.run(
                  ["git", "--no-replace-objects", "-C", str(checkout), *arguments],
                  stdout=subprocess.PIPE,
                  stderr=subprocess.PIPE,
                  check=False,
                  env={**os.environ, "GIT_NO_REPLACE_OBJECTS": "1"},
              )
              if result.returncode != 0:
                  raise SystemExit(f"snapshot_verify_git_failed:{arguments[0]}")
              return result.stdout

          for name, sha in (("base", os.environ["BASE_SHA"]), ("head", os.environ["HEAD_SHA"])):
              expected = payload[name]
              if not isinstance(expected, dict):
                  raise SystemExit("snapshot_inventory_invalid")
              root = workspace / name
              checkout = workspace / f"{name}_checkout"
              if git(checkout, "cat-file", "-t", sha) != b"commit\n":
                  raise SystemExit("snapshot_source_not_commit")
              if git(checkout, "for-each-ref", "--format=%(refname)", "refs/replace").strip():
                  raise SystemExit("snapshot_replace_ref_present")
              actual: set[str] = set()
              for item in root.rglob("*"):
                  if item.is_symlink():
                      raise SystemExit("snapshot_symlink_created")
                  if item.is_file():
                      actual.add(item.relative_to(root).as_posix())
              if actual != set(expected):
                  raise SystemExit("snapshot_file_set_changed_after_execution")
              for path, record in expected.items():
                  if not isinstance(record, dict) or set(record) != {"mode", "sha256"}:
                      raise SystemExit("snapshot_inventory_invalid")
                  target = root.joinpath(*path.split("/"))
                  data = target.read_bytes()
                  expected_mode = 0o755 if record["mode"] == "100755" else 0o644
                  if stat.S_IMODE(target.stat().st_mode) != expected_mode:
                      raise SystemExit("snapshot_mode_changed_after_execution")
                  digest = hashlib.sha256(data).hexdigest()
                  if digest != record["sha256"]:
                      raise SystemExit("snapshot_bytes_changed_after_execution")
                  source = git(checkout, "show", f"{sha}:{path}")
                  if hashlib.sha256(source).hexdigest() != digest:
                      raise SystemExit("snapshot_source_changed_after_install")
          PY

  status-final:
    name: publish pm-acceptance result
    if: ${{ always() }}
    needs: [status-pending, protected-paths, acceptance]
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
      pull-requests: read
      statuses: write
    steps:
      - name: Publish final aggregate status
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          EXPECTED_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          REPOSITORY: ${{ github.repository }}
          API_URL: ${{ github.api_url }}
          SERVER_URL: ${{ github.server_url }}
          RUN_ID: ${{ github.run_id }}
          PENDING_RESULT: ${{ needs.status-pending.result }}
          PROTECTED_RESULT: ${{ needs.protected-paths.result }}
          ACCEPTANCE_RESULT: ${{ needs.acceptance.result }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_DRAFT: ${{ github.event.pull_request.draft }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_LABELS_JSON: ${{ toJSON(github.event.pull_request.labels.*.name) }}
          PR_HEAD_REPOSITORY: ${{ github.repository }}
          PR_BASE_REPOSITORY: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          EVENT_SENDER: ${{ github.event.sender.login }}
          TRIGGERING_ACTOR: ${{ github.triggering_actor }}
          REVIEW_AUTHOR: ${{ github.event.review.user.login }}
          REVIEW_STATE: ${{ github.event.review.state }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import urllib.request

          sha = os.environ["HEAD_SHA"]
          repository = os.environ["REPOSITORY"]
          if repository != "brullik/bybit-grid-research":
              raise SystemExit("invalid_repository")
          expected_base_sha = os.environ["EXPECTED_BASE_SHA"]
          if (
              re.fullmatch(r"[0-9a-f]{40}", sha) is None
              or re.fullmatch(r"[0-9a-f]{40}", expected_base_sha) is None
          ):
              raise SystemExit("invalid_head_sha")
          try:
              pr_number = int(os.environ["PR_NUMBER"])
              expected_labels = json.loads(os.environ["PR_LABELS_JSON"])
          except (ValueError, json.JSONDecodeError) as exc:
              raise SystemExit("invalid_pull_request_identity_input") from exc
          if (
              pr_number <= 0
              or not isinstance(expected_labels, list)
              or any(not isinstance(label, str) for label in expected_labels)
              or len(set(expected_labels)) != len(expected_labels)
          ):
              raise SystemExit("invalid_pull_request_identity_input")

          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f'Bearer {os.environ["GH_TOKEN"]}',
              "X-GitHub-Api-Version": "2022-11-28",
          }
          live_request = urllib.request.Request(
              f"{os.environ['API_URL']}/repos/{repository}/pulls/{pr_number}",
              headers=headers,
          )
          with urllib.request.urlopen(live_request, timeout=30) as response:
              if response.status != 200:
                  raise SystemExit(f"live_pull_request_read_failed:{response.status}")
              live = json.loads(response.read())
          try:
              live_identity = {
                  "author": live["user"]["login"],
                  "base_ref": live["base"]["ref"],
                  "base_repository": live["base"]["repo"]["full_name"],
                  "base_sha": live["base"]["sha"],
                  "draft": str(live["draft"]).lower(),
                  "head_ref": live["head"]["ref"],
                  "head_repository": live["head"]["repo"]["full_name"],
                  "head_sha": live["head"]["sha"],
                  "labels": sorted(label["name"] for label in live["labels"]),
                  "state": live["state"],
              }
          except (KeyError, TypeError) as exc:
              raise SystemExit("live_pull_request_identity_malformed") from exc
          expected_identity = {
              "author": os.environ["PR_AUTHOR"],
              "base_ref": os.environ["BASE_REF"],
              "base_repository": os.environ["PR_BASE_REPOSITORY"],
              "base_sha": expected_base_sha,
              "draft": os.environ["PR_DRAFT"],
              "head_ref": os.environ["HEAD_REF"],
              "head_repository": os.environ["PR_HEAD_REPOSITORY"],
              "head_sha": sha,
              "labels": sorted(expected_labels),
              "state": "open",
          }
          if live_identity != expected_identity:
              raise SystemExit("live_pull_request_identity_mismatch")

          main_request = urllib.request.Request(
              f"{os.environ['API_URL']}/repos/{repository}/git/ref/heads/main",
              headers=headers,
          )
          with urllib.request.urlopen(main_request, timeout=30) as response:
              if response.status != 200:
                  raise SystemExit(f"live_main_read_failed:{response.status}")
              live_main = json.loads(response.read())
          try:
              live_main_sha = live_main["object"]["sha"]
          except (KeyError, TypeError) as exc:
              raise SystemExit("live_main_identity_malformed") from exc
          if (
              not isinstance(live_main_sha, str)
              or re.fullmatch(r"[0-9a-f]{40}", live_main_sha) is None
              or live_main_sha != expected_base_sha
          ):
              raise SystemExit("live_main_sha_mismatch")

          owner, name = repository.split("/", 1)
          query = (
              "query($owner:String!,$name:String!,$number:Int!,$after:String){"
              "repository(owner:$owner,name:$name){pullRequest(number:$number){"
              "reviewThreads(first:100,after:$after){nodes{isResolved}"
              "pageInfo{hasNextPage endCursor}}}}}"
          )
          thread_nodes = []
          cursor = None
          seen_cursors = set()
          while True:
              graph_payload = {
                  "query": query,
                  "variables": {
                      "after": cursor,
                      "name": name,
                      "number": pr_number,
                      "owner": owner,
                  },
              }
              graph_request = urllib.request.Request(
                  f"{os.environ['API_URL']}/graphql",
                  data=json.dumps(graph_payload, separators=(",", ":")).encode(),
                  headers=headers,
                  method="POST",
              )
              with urllib.request.urlopen(graph_request, timeout=30) as response:
                  if response.status != 200:
                      raise SystemExit(f"review_thread_read_failed:{response.status}")
                  graph = json.loads(response.read())
              try:
                  review_threads = graph["data"]["repository"]["pullRequest"]["reviewThreads"]
                  page_nodes = review_threads["nodes"]
                  page_info = review_threads["pageInfo"]
                  has_next_page = page_info["hasNextPage"]
                  end_cursor = page_info["endCursor"]
              except (KeyError, TypeError) as exc:
                  raise SystemExit("review_thread_state_malformed") from exc
              if (
                  type(has_next_page) is not bool
                  or not isinstance(page_nodes, list)
                  or any(not isinstance(thread, dict) for thread in page_nodes)
              ):
                  raise SystemExit("review_thread_state_malformed")
              thread_nodes.extend(page_nodes)
              if not has_next_page:
                  break
              cursor = end_cursor
              if not isinstance(cursor, str) or not cursor or cursor in seen_cursors:
                  raise SystemExit("review_thread_state_malformed")
              seen_cursors.add(cursor)
          if any(thread.get("isResolved") is not True for thread in thread_nodes):
              raise SystemExit("unresolved_review_threads")
          results = {
              "pending": os.environ["PENDING_RESULT"],
              "protected": os.environ["PROTECTED_RESULT"],
              "acceptance": os.environ["ACCEPTANCE_RESULT"],
          }
          upstream_success = all(result == "success" for result in results.values())
          ready = live_identity["draft"] == "false"
          owner_authored = os.environ["PR_AUTHOR"] == "brullik"
          non_probe = not os.environ["HEAD_REF"].startswith("probe/")
          governed_pull_request = (
              os.environ["EVENT_NAME"] == "pull_request_target"
              and os.environ["EVENT_ACTION"] in {
                  "opened",
                  "synchronize",
                  "reopened",
                  "edited",
                  "ready_for_review",
                  "converted_to_draft",
                  "labeled",
                  "unlabeled",
              }
          )
          governed_review = (
              os.environ["EVENT_NAME"] == "pull_request_review"
              and os.environ["EVENT_ACTION"] == "submitted"
              and os.environ["EVENT_SENDER"] == "brullik"
              and os.environ["TRIGGERING_ACTOR"] == "brullik"
              and os.environ["REVIEW_AUTHOR"] == "brullik"
              and os.environ["REVIEW_STATE"] == "commented"
          )
          governed_trigger = governed_pull_request or governed_review
          successful = (
              upstream_success
              and ready
              and owner_authored
              and non_probe
              and governed_trigger
          )
          if successful:
              state = "success"
          elif upstream_success or any(result == "failure" for result in results.values()):
              state = "failure"
          else:
              state = "error"
          results.update({
              "ready": str(ready).lower(),
              "owner": str(owner_authored).lower(),
              "non_probe": str(non_probe).lower(),
              "trigger": str(governed_trigger).lower(),
          })
          summary = ", ".join(f"{name}={result}" for name, result in results.items())
          payload = {
              "state": state,
              "target_url": (
                  f'{os.environ["SERVER_URL"]}/{os.environ["REPOSITORY"]}'
                  f'/actions/runs/{os.environ["RUN_ID"]}'
              ),
              "description": summary[:140],
              "context": "pm-acceptance",
          }
          request = urllib.request.Request(
              f'{os.environ["API_URL"]}/repos/{os.environ["REPOSITORY"]}/statuses/{sha}',
              data=json.dumps(payload, separators=(",", ":")).encode(),
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f'Bearer {os.environ["GH_TOKEN"]}',
                  "X-GitHub-Api-Version": "2022-11-28",
              },
              method="POST",
          )
          with urllib.request.urlopen(request, timeout=30) as response:
              if response.status != 201:
                  raise SystemExit(f"status_publish_failed:{response.status}")
          if not successful:
              raise SystemExit("pm_acceptance_failed")
          PY
