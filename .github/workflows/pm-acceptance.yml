name: PM Acceptance
on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review, converted_to_draft, labeled, unlabeled]
permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pm-acceptance-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  status-pending:
    name: publish pm-acceptance pending
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      statuses: write
    steps:
      - name: Publish pending aggregate status
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPOSITORY: ${{ github.repository }}
          API_URL: ${{ github.api_url }}
          SERVER_URL: ${{ github.server_url }}
          RUN_ID: ${{ github.run_id }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import urllib.request

          sha = os.environ["HEAD_SHA"]
          if os.environ["REPOSITORY"] != "brullik/bybit-grid-research":
              raise SystemExit("invalid_repository")
          if re.fullmatch(r"[0-9a-f]{40}", sha) is None:
              raise SystemExit("invalid_head_sha")
          payload = {
              "state": "pending",
              "target_url": (
                  f'{os.environ["SERVER_URL"]}/{os.environ["REPOSITORY"]}'
                  f'/actions/runs/{os.environ["RUN_ID"]}'
              ),
              "description": "PM acceptance is running",
              "context": "pm-acceptance",
          }
          request = urllib.request.Request(
              f'{os.environ["API_URL"]}/repos/{os.environ["REPOSITORY"]}/statuses/{sha}',
              data=json.dumps(payload, separators=(",", ":")).encode(),
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f'Bearer {os.environ["GH_TOKEN"]}',
                  "X-GitHub-Api-Version": "2022-11-28",
              },
              method="POST",
          )
          with urllib.request.urlopen(request, timeout=30) as response:
              if response.status != 201:
                  raise SystemExit(f"status_publish_failed:{response.status}")
          PY

  protected-paths:
    name: protected-paths
    runs-on: ubuntu-latest
    outputs:
      pr-mode: ${{ steps.scope.outputs.pr_mode }}
      task-id: ${{ steps.scope.outputs.task_id }}
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false
          fetch-depth: 0
      - name: Fetch PR head for diff only
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: git fetch --no-tags origin "$HEAD_SHA"
      - name: Check PR mode, protected paths, and task scope
        id: scope
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_ACTOR: ${{ github.event.pull_request.user.login }}
          PR_LABELS_JSON: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: |
          set +e
          json=$(python scripts/check_task_scope.py --task-file pm_acceptance/active_task.json --base-sha "$BASE_SHA" --head-sha "$HEAD_SHA" --actor "$PR_ACTOR" --labels-json "$PR_LABELS_JSON")
          status=$?
          printf '%s\n' "$json"
          if [ "$status" -ne 0 ]; then
            exit "$status"
          fi
          pr_mode=$(JSON_PAYLOAD="$json" python -c 'import json, os; mode=json.loads(os.environ["JSON_PAYLOAD"]).get("mode"); assert mode in {"implementation","pm-task-definition","pm-control-plane","pm-frozen-erratum"}, mode; print(mode)')
          task_id=$(JSON_PAYLOAD="$json" python -c 'import json, os; task_id=json.loads(os.environ["JSON_PAYLOAD"]).get("task_id"); assert isinstance(task_id, str) and task_id; print(task_id)')
          printf 'pr_mode=%s\n' "$pr_mode" >> "$GITHUB_OUTPUT"
          printf 'task_id=%s\n' "$task_id" >> "$GITHUB_OUTPUT"

  acceptance:
    name: acceptance (${{ matrix.python-version }})
    needs: protected-paths
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.14']
    steps:
      - name: Checkout base control plane
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base
          persist-credentials: false
          fetch-depth: 0
      - name: Checkout PR head production code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: head
          persist-credentials: false
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # Security: PR code is executed with a read-only token, persist-credentials=false, no secrets, and base-controlled acceptance tests.
      - name: Stage base-controlled acceptance harness
        env:
          RUNNER_TEMP: ${{ runner.temp }}
        run: |
          rm -rf "$RUNNER_TEMP/pm_acceptance" "$RUNNER_TEMP/scripts" "$RUNNER_TEMP/frozen_contracts" "$RUNNER_TEMP/.github"
          cp -R base/pm_acceptance "$RUNNER_TEMP/pm_acceptance"
          cp -R base/docs/frozen_contracts "$RUNNER_TEMP/frozen_contracts"
          mkdir -p "$RUNNER_TEMP/scripts"
          mkdir -p "$RUNNER_TEMP/.github/workflows"
          printf '' > "$RUNNER_TEMP/scripts/__init__.py"
          cp base/scripts/check_protected_paths.py "$RUNNER_TEMP/scripts/check_protected_paths.py"
          cp base/scripts/check_task_scope.py "$RUNNER_TEMP/scripts/check_task_scope.py"
          cp base/.github/workflows/pm-acceptance.yml "$RUNNER_TEMP/.github/workflows/pm-acceptance.yml"
          printf '[pytest]\n' > "$RUNNER_TEMP/pytest.ini"
      - name: Install PR package
        working-directory: head
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Run base isolated acceptance harness
        if: needs.protected-paths.outputs.pr-mode != 'pm-task-definition' && needs.protected-paths.outputs.pr-mode != 'pm-frozen-erratum'
        working-directory: ${{ runner.temp }}
        env:
          PYTHONPATH: ${{ runner.temp }}:${{ github.workspace }}/base
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: '1'
          RUNNER_TEMP: ${{ runner.temp }}
        run: |
          python -m pytest pm_acceptance -q \
            -c "$RUNNER_TEMP/pytest.ini" \
            --confcutdir="$RUNNER_TEMP/pm_acceptance"
      - name: Run base control-plane self-tests for task-definition and frozen-erratum PRs
        if: needs.protected-paths.outputs.pr-mode == 'pm-task-definition' || needs.protected-paths.outputs.pr-mode == 'pm-frozen-erratum'
        working-directory: ${{ runner.temp }}
        env:
          PYTHONPATH: ${{ runner.temp }}:${{ github.workspace }}/base
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: '1'
          RUNNER_TEMP: ${{ runner.temp }}
        run: |
          python -m pytest pm_acceptance/test_control_plane_self.py -q \
            -c "$RUNNER_TEMP/pytest.ini" \
            --confcutdir="$RUNNER_TEMP/pm_acceptance"
      - name: Stage head control-plane self-tests
        if: needs.protected-paths.outputs.pr-mode == 'pm-control-plane'
        env:
          RUNNER_TEMP: ${{ runner.temp }}
        run: |
          rm -rf "$RUNNER_TEMP/head_control"
          mkdir -p "$RUNNER_TEMP/head_control/scripts" "$RUNNER_TEMP/head_control/.github/workflows"
          cp -R head/pm_acceptance "$RUNNER_TEMP/head_control/pm_acceptance"
          printf '' > "$RUNNER_TEMP/head_control/scripts/__init__.py"
          cp head/scripts/check_protected_paths.py "$RUNNER_TEMP/head_control/scripts/check_protected_paths.py"
          cp head/scripts/check_task_scope.py "$RUNNER_TEMP/head_control/scripts/check_task_scope.py"
          cp head/.github/workflows/pm-acceptance.yml "$RUNNER_TEMP/head_control/.github/workflows/pm-acceptance.yml"
          printf '[pytest]\n' > "$RUNNER_TEMP/head_control/pytest.ini"
      - name: Run head control-plane self-tests
        if: needs.protected-paths.outputs.pr-mode == 'pm-control-plane'
        working-directory: ${{ runner.temp }}/head_control
        env:
          PYTHONPATH: ${{ runner.temp }}/head_control
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: '1'
        run: |
          python -m pytest pm_acceptance/test_control_plane_self.py -q \
            -c pytest.ini \
            --confcutdir=pm_acceptance
      - name: Stage head task-definition acceptance tree
        if: needs.protected-paths.outputs.pr-mode == 'pm-task-definition' && needs.protected-paths.outputs.task-id != 'NO_ACTIVE_IMPLEMENTATION'
        env:
          RUNNER_TEMP: ${{ runner.temp }}
          TASK_ID: ${{ needs.protected-paths.outputs.task-id }}
        run: |
          rm -rf "$RUNNER_TEMP/head_task_definition"
          mkdir -p "$RUNNER_TEMP/head_task_definition/pm_acceptance/tasks"
          cp -R "head/pm_acceptance/tasks/$TASK_ID" \
            "$RUNNER_TEMP/head_task_definition/pm_acceptance/tasks/$TASK_ID"
          printf '[pytest]\n' > "$RUNNER_TEMP/head_task_definition/pytest.ini"
      - name: Compile and collect head task-definition acceptance tests
        if: needs.protected-paths.outputs.pr-mode == 'pm-task-definition' && needs.protected-paths.outputs.task-id != 'NO_ACTIVE_IMPLEMENTATION'
        env:
          HEAD_ACCEPTANCE_TEMP: ${{ runner.temp }}/head_task_definition
          TASK_ID: ${{ needs.protected-paths.outputs.task-id }}
          PYTHONPATH: ${{ runner.temp }}/head_task_definition
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: '1'
        run: |
          task_path="$HEAD_ACCEPTANCE_TEMP/pm_acceptance/tasks/$TASK_ID"
          python -m compileall -q "$task_path"
          python -m pytest "$task_path" --collect-only -q \
            -c "$HEAD_ACCEPTANCE_TEMP/pytest.ini" \
            --confcutdir="$task_path"
      - name: Stage SHA-pinned head frozen erratum
        id: erratum-stage
        if: needs.protected-paths.outputs.pr-mode == 'pm-frozen-erratum'
        env:
          ERRATUM_TEMP: ${{ runner.temp }}/head_frozen_erratum
          TASK_ID: ${{ needs.protected-paths.outputs.task-id }}
        run: |
          rm -rf "$ERRATUM_TEMP"
          ERRATUM_TEMP="$ERRATUM_TEMP" TASK_ID="$TASK_ID" python - <<'PY'
          from __future__ import annotations

          import hashlib
          import json
          import os
          from pathlib import Path, PurePosixPath
          import re
          import shutil
          import subprocess

          def reject_constant(value: str) -> None:
              raise ValueError(f"invalid_json_constant:{value}")

          def reject_float(value: str) -> None:
              raise ValueError(f"float_token:{value}")

          def pairs_hook(pairs: list[tuple[str, object]]) -> dict[str, object]:
              result: dict[str, object] = {}
              for key, value in pairs:
                  if key in result:
                      raise ValueError(f"duplicate_json_key:{key}")
                  result[key] = value
              return result

          task_id = os.environ["TASK_ID"]
          if re.fullmatch(r"[a-z0-9](?:[a-z0-9-]{0,62}[a-z0-9])?", task_id) is None:
              raise SystemExit("invalid_erratum_task_id")
          v1_manifest_path = Path("head/pm_acceptance/errata") / f"{task_id}.json"
          v2_manifest_path = Path("head/pm_acceptance/errata") / f"{task_id}.v2.json"
          if v2_manifest_path.is_file():
              manifest_path = v2_manifest_path
              erratum_version = "v2"
          elif v1_manifest_path.is_file():
              manifest_path = v1_manifest_path
              erratum_version = "v1"
          else:
              raise SystemExit("erratum_manifest_missing")
          raw = manifest_path.read_bytes()
          if raw.startswith(b"\xef\xbb\xbf"):
              raise SystemExit("erratum_manifest_utf8_bom")
          try:
              manifest = json.loads(
                  raw.decode("utf-8", "strict"),
                  object_pairs_hook=pairs_hook,
                  parse_float=reject_float,
                  parse_constant=reject_constant,
              )
          except (UnicodeDecodeError, ValueError, json.JSONDecodeError) as exc:
              raise SystemExit(f"invalid_erratum_manifest:{exc}") from exc
          if not isinstance(manifest, dict):
              raise SystemExit("erratum_manifest_not_object")
          expected_keys = {
              "base_sha256",
              "expected_red_failed_node_ids",
              "expected_red_passed_node_ids",
              "head_active_task_sha256",
              "head_sha256",
              "historical_active_task_commit_sha",
              "issue_number",
              "reason_code",
              "schema",
              "task_id",
              "test_path",
          }
          if erratum_version == "v2":
              expected_keys.update({
                  "predecessor_commit_sha",
                  "predecessor_manifest_sha256",
              })
          if set(manifest) != expected_keys:
              raise SystemExit("invalid_erratum_manifest_keys")
          canonical = json.dumps(manifest, sort_keys=True, separators=(",", ":")).encode() + b"\n"
          if raw != canonical:
              raise SystemExit("noncanonical_erratum_manifest_bytes")
          expected_schema = f"pm_frozen_erratum_{erratum_version}"
          if manifest["schema"] != expected_schema or manifest["task_id"] != task_id:
              raise SystemExit("erratum_manifest_identity_mismatch")
          historical_commit = manifest["historical_active_task_commit_sha"]
          if not isinstance(historical_commit, str) or re.fullmatch(r"[0-9a-f]{40}", historical_commit) is None:
              raise SystemExit("invalid_erratum_historical_active_task_commit_sha")
          test_path_text = manifest["test_path"]
          if not isinstance(test_path_text, str):
              raise SystemExit("invalid_erratum_test_path")
          test_path = PurePosixPath(test_path_text)
          expected_parent = PurePosixPath("pm_acceptance/tasks") / task_id
          if (
              test_path.parent != expected_parent
              or not test_path.name.startswith("test_")
              or test_path.suffix != ".py"
              or test_path.is_absolute()
              or ".." in test_path.parts
              or test_path.as_posix() != test_path_text
              or "\\" in test_path_text
              or any(ord(character) < 32 or ord(character) == 127 for character in test_path_text)
          ):
              raise SystemExit("invalid_erratum_test_path")
          base_source = Path("base") / Path(*test_path.parts)
          head_source = Path("head") / Path(*test_path.parts)
          base_digest = hashlib.sha256(base_source.read_bytes()).hexdigest()
          head_digest = hashlib.sha256(head_source.read_bytes()).hexdigest()
          if base_digest != manifest["base_sha256"]:
              raise SystemExit("erratum_base_sha256_mismatch")
          if head_digest != manifest["head_sha256"]:
              raise SystemExit("erratum_head_sha256_mismatch")
          active_task_digest = hashlib.sha256(
              Path("head/pm_acceptance/active_task.json").read_bytes()
          ).hexdigest()
          if active_task_digest != manifest["head_active_task_sha256"]:
              raise SystemExit("erratum_head_active_task_sha256_mismatch")
          if erratum_version == "v2":
              predecessor_path = Path("base/pm_acceptance/errata") / f"{task_id}.json"
              predecessor_raw = predecessor_path.read_bytes()
              predecessor_digest = hashlib.sha256(predecessor_raw).hexdigest()
              if predecessor_digest != manifest["predecessor_manifest_sha256"]:
                  raise SystemExit("erratum_v2_predecessor_manifest_sha256_mismatch")
              try:
                  predecessor = json.loads(
                      predecessor_raw.decode("utf-8", "strict"),
                      object_pairs_hook=pairs_hook,
                      parse_float=reject_float,
                      parse_constant=reject_constant,
                  )
              except (UnicodeDecodeError, ValueError, json.JSONDecodeError) as exc:
                  raise SystemExit(f"invalid_erratum_v2_predecessor:{exc}") from exc
              predecessor_canonical = json.dumps(
                  predecessor,
                  sort_keys=True,
                  separators=(",", ":"),
              ).encode() + b"\n"
              if predecessor_raw != predecessor_canonical:
                  raise SystemExit("noncanonical_erratum_v2_predecessor_bytes")
              if (
                  not isinstance(predecessor, dict)
                  or predecessor.get("schema") != "pm_frozen_erratum_v1"
                  or predecessor.get("task_id") != task_id
                  or predecessor.get("test_path") != test_path_text
                  or predecessor.get("issue_number") != manifest["issue_number"]
                  or predecessor.get("head_sha256") != manifest["base_sha256"]
                  or predecessor.get("head_active_task_sha256")
                  != manifest["head_active_task_sha256"]
                  or predecessor.get("historical_active_task_commit_sha")
                  != manifest["historical_active_task_commit_sha"]
              ):
                  raise SystemExit("erratum_v2_predecessor_chain_mismatch")
              predecessor_commit = manifest["predecessor_commit_sha"]
              if (
                  not isinstance(predecessor_commit, str)
                  or re.fullmatch(r"[0-9a-f]{40}", predecessor_commit) is None
              ):
                  raise SystemExit("invalid_erratum_v2_predecessor_commit_sha")
              ancestor = subprocess.run(
                  [
                      "git",
                      "-C",
                      "base",
                      "merge-base",
                      "--is-ancestor",
                      predecessor_commit,
                      "HEAD",
                  ],
                  stdout=subprocess.DEVNULL,
                  stderr=subprocess.DEVNULL,
                  check=False,
              )
              if ancestor.returncode != 0:
                  raise SystemExit("erratum_v2_predecessor_commit_not_ancestor")

              def git_show(path: str) -> bytes:
                  shown = subprocess.run(
                      ["git", "-C", "base", "show", f"{predecessor_commit}:{path}"],
                      stdout=subprocess.PIPE,
                      stderr=subprocess.DEVNULL,
                      check=False,
                  )
                  if shown.returncode != 0:
                      raise SystemExit("erratum_v2_predecessor_commit_unreadable")
                  return shown.stdout

              if git_show(f"pm_acceptance/errata/{task_id}.json") != predecessor_raw:
                  raise SystemExit("erratum_v2_predecessor_manifest_bytes_mismatch")
              if hashlib.sha256(git_show(test_path_text)).hexdigest() != manifest["base_sha256"]:
                  raise SystemExit("erratum_v2_predecessor_commit_test_sha256_mismatch")
              if git_show("pm_acceptance/active_task.json") != Path(
                  "head/pm_acceptance/active_task.json"
              ).read_bytes():
                  raise SystemExit("erratum_v2_predecessor_active_task_bytes_mismatch")
          destination_root = Path(os.environ["ERRATUM_TEMP"])
          destination_base_test = destination_root / "base_suite" / Path(*test_path.parts)
          destination_head_test = destination_root / "head_suite" / Path(*test_path.parts)
          destination_manifest = destination_root / "pm_acceptance/errata" / manifest_path.name
          destination_base_test.parent.mkdir(parents=True)
          destination_head_test.parent.mkdir(parents=True)
          destination_manifest.parent.mkdir(parents=True)
          shutil.copyfile(base_source, destination_base_test)
          shutil.copyfile(head_source, destination_head_test)
          shutil.copyfile(manifest_path, destination_manifest)
          (destination_root / "base_suite/pytest.ini").write_text("[pytest]\n", encoding="utf-8")
          (destination_root / "head_suite/pytest.ini").write_text("[pytest]\n", encoding="utf-8")
          normal_root = destination_root / "normal_suite"
          shutil.copytree(Path("base/pm_acceptance"), normal_root / "pm_acceptance")
          normal_head_test = normal_root / Path(*test_path.parts)
          shutil.copyfile(head_source, normal_head_test)
          normal_scripts = normal_root / "scripts"
          normal_scripts.mkdir()
          (normal_scripts / "__init__.py").write_text("", encoding="utf-8")
          shutil.copyfile(
              Path("base/scripts/check_protected_paths.py"),
              normal_scripts / "check_protected_paths.py",
          )
          shutil.copyfile(
              Path("base/scripts/check_task_scope.py"),
              normal_scripts / "check_task_scope.py",
          )
          (normal_root / "pytest.ini").write_text("[pytest]\n", encoding="utf-8")
          output = Path(os.environ["GITHUB_OUTPUT"])
          with output.open("a", encoding="utf-8") as stream:
              stream.write(f"test_path={test_path.as_posix()}\n")
              stream.write(f"manifest_path=pm_acceptance/errata/{manifest_path.name}\n")
              stream.write(f"erratum_version={erratum_version}\n")
          PY
      - name: Run corrected head erratum and verify exact RED manifest
        if: needs.protected-paths.outputs.pr-mode == 'pm-frozen-erratum' && steps.erratum-stage.outputs.erratum_version == 'v1'
        working-directory: ${{ runner.temp }}/head_frozen_erratum
        env:
          ERRATUM_MANIFEST: ${{ steps.erratum-stage.outputs.manifest_path }}
          ERRATUM_TEST_PATH: ${{ steps.erratum-stage.outputs.test_path }}
          TRUSTED_BASE: ${{ github.workspace }}/base
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: '1'
        run: |
          python - <<'PY'
          from __future__ import annotations

          import json
          import os
          from pathlib import Path
          import subprocess
          import sys


          CHILD = r'''
          from __future__ import annotations

          import json
          import os
          from pathlib import Path

          import pytest


          class ExactOutcomes:
              def __init__(self) -> None:
                  self.collected: list[str] = []
                  self.passed: list[str] = []
                  self.failed: list[str] = []
                  self.forbidden: list[str] = []
                  self.call_node_ids: set[str] = set()

              def pytest_collection_finish(self, session: pytest.Session) -> None:
                  self.collected = [item.nodeid for item in session.items]
                  if len(set(self.collected)) != len(self.collected):
                      self.forbidden.append("duplicate-collected-node-id")

              def pytest_collectreport(self, report: pytest.CollectReport) -> None:
                  if report.failed or report.skipped:
                      self.forbidden.append(f"collect-{report.outcome}:{report.nodeid}")

              def pytest_deselected(self, items: list[pytest.Item]) -> None:
                  self.forbidden.extend(f"deselected:{item.nodeid}" for item in items)

              def pytest_runtest_logreport(self, report: pytest.TestReport) -> None:
                  if getattr(report, "wasxfail", None) is not None:
                      self.forbidden.append(f"xfail-or-xpass:{report.nodeid}:{report.when}")
                  if report.when != "call":
                      if report.failed or report.skipped:
                          self.forbidden.append(f"{report.when}-{report.outcome}:{report.nodeid}")
                      return
                  if report.nodeid in self.call_node_ids:
                      self.forbidden.append(f"duplicate-call:{report.nodeid}")
                      return
                  self.call_node_ids.add(report.nodeid)
                  if report.passed:
                      self.passed.append(report.nodeid)
                  elif report.failed:
                      self.failed.append(report.nodeid)
                  else:
                      self.forbidden.append(f"call-{report.outcome}:{report.nodeid}")


          mode = os.environ["EXACT_MODE"]
          test_path = os.environ["EXACT_TEST_PATH"]
          arguments = [
              test_path,
              "-q",
              "-c",
              str(Path.cwd() / "pytest.ini"),
              f"--confcutdir={Path.cwd() / 'pm_acceptance'}",
          ]
          if mode == "collect":
              arguments.append("--collect-only")
          elif mode != "execute":
              raise SystemExit("invalid_exact_mode")
          outcomes = ExactOutcomes()
          exit_code = pytest.main(arguments, plugins=[outcomes])
          payload = {
              "collected": outcomes.collected,
              "exit_code": int(exit_code),
              "failed": outcomes.failed,
              "forbidden": outcomes.forbidden,
              "passed": outcomes.passed,
          }
          Path(os.environ["EXACT_RESULT_PATH"]).write_text(
              json.dumps(payload, sort_keys=True, separators=(",", ":")) + "\n",
              encoding="utf-8",
          )
          '''


          def run_isolated(
              mode: str,
              suite_root: Path,
              test_path: str,
              python_path: tuple[Path, ...],
          ) -> dict[str, object]:
              result_path = Path.cwd() / f".{mode}-outcomes.json"
              result_path.unlink(missing_ok=True)
              environment = dict(os.environ)
              environment.update({
                  "EXACT_MODE": mode,
                  "EXACT_RESULT_PATH": str(result_path),
                  "EXACT_TEST_PATH": test_path,
                  "PYTEST_DISABLE_PLUGIN_AUTOLOAD": "1",
                  "PYTHONPATH": os.pathsep.join(str(path) for path in python_path),
                  "RUNNER_TEMP": str(suite_root),
              })
              result = subprocess.run(
                  [sys.executable, "-c", CHILD],
                  cwd=suite_root,
                  env=environment,
                  stdout=subprocess.PIPE,
                  stderr=subprocess.PIPE,
                  text=True,
                  check=False,
              )
              if result.returncode != 0 or not result_path.is_file():
                  raise SystemExit(f"isolated_{mode}_runner_failed:{result.returncode}")
              payload = json.loads(result_path.read_text(encoding="utf-8"))
              expected_keys = {"collected", "exit_code", "failed", "forbidden", "passed"}
              if not isinstance(payload, dict) or set(payload) != expected_keys:
                  raise SystemExit(f"invalid_{mode}_runner_payload")
              return payload


          def checked_node_ids(payload: dict[str, object], key: str, mode: str) -> list[str]:
              value = payload[key]
              if (
                  not isinstance(value, list)
                  or any(not isinstance(item, str) or not item for item in value)
                  or len(set(value)) != len(value)
              ):
                  raise SystemExit(f"invalid_{mode}_{key}")
              return value


          manifest = json.loads(Path(os.environ["ERRATUM_MANIFEST"]).read_text(encoding="utf-8"))
          expected_failed = manifest["expected_red_failed_node_ids"]
          expected_passed = manifest["expected_red_passed_node_ids"]
          expected_prefix = f"{os.environ['ERRATUM_TEST_PATH']}::"
          if (
              not isinstance(expected_failed, list)
              or not expected_failed
              or not isinstance(expected_passed, list)
              or any(not isinstance(item, str) or not item for item in expected_failed + expected_passed)
              or any(
                  not item.startswith(expected_prefix)
                  or any(ord(character) < 32 or ord(character) == 127 for character in item)
                  for item in expected_failed + expected_passed
              )
              or len(set(expected_failed + expected_passed)) != len(expected_failed + expected_passed)
          ):
              raise SystemExit("invalid_erratum_expected_outcomes")
          base_result = run_isolated(
              "collect",
              Path.cwd() / "base_suite",
              os.environ["ERRATUM_TEST_PATH"],
              (Path.cwd() / "base_suite", Path(os.environ["TRUSTED_BASE"])),
          )
          errors: list[str] = []
          base_collected = checked_node_ids(base_result, "collected", "base")
          base_forbidden = checked_node_ids(base_result, "forbidden", "base")
          if type(base_result["exit_code"]) is not int or base_result["exit_code"] != 0:
              errors.append(f"unexpected_base_collect_exit:{base_result['exit_code']}")
          if not base_collected:
              errors.append("base_collection_empty")
          if base_forbidden:
              errors.append("base_forbidden_outcomes=" + ",".join(sorted(base_forbidden)))
          expected_union = expected_failed + expected_passed
          if sorted(expected_union) != sorted(base_collected):
              errors.append("expected_node_ids_vs_base_collection_mismatch")

          normal_suite = Path.cwd() / "normal_suite"
          staged_scripts = normal_suite / "scripts"
          if (
              (staged_scripts / "__init__.py").read_bytes() != b""
              or not (staged_scripts / "check_protected_paths.py").is_file()
              or not (staged_scripts / "check_task_scope.py").is_file()
          ):
              raise SystemExit("invalid_v1_normal_staged_scripts")
          head_result = run_isolated(
              "execute",
              normal_suite,
              os.environ["ERRATUM_TEST_PATH"],
              (normal_suite,),
          )
          head_collected = checked_node_ids(head_result, "collected", "head")
          head_failed = checked_node_ids(head_result, "failed", "head")
          head_forbidden = checked_node_ids(head_result, "forbidden", "head")
          head_passed = checked_node_ids(head_result, "passed", "head")
          if type(head_result["exit_code"]) is not int or head_result["exit_code"] != 1:
              errors.append(f"unexpected_head_pytest_exit:{head_result['exit_code']}")
          if head_forbidden:
              errors.append("forbidden_outcomes=" + ",".join(sorted(head_forbidden)))
          if sorted(head_collected) != sorted(base_collected):
              errors.append("head_vs_base_collection_mismatch")
          if sorted(head_failed + head_passed) != sorted(base_collected):
              errors.append("head_outcome_union_vs_base_collection_mismatch")
          if sorted(head_failed) != sorted(expected_failed):
              errors.append("failed_node_ids_mismatch")
          if sorted(head_passed) != sorted(expected_passed):
              errors.append("passed_node_ids_mismatch")
          if errors:
              raise SystemExit(";".join(errors))
          print(
              json.dumps(
                  {
                      "baseline_collected_count": len(base_collected),
                      "failed_node_ids": sorted(head_failed),
                      "passed_node_ids": sorted(head_passed),
                      "status": "exact-red-manifest-matched",
                  },
                  sort_keys=True,
                  separators=(",", ":"),
              )
          )
          PY
      - name: Run v2 corrected head under normal isolated import order
        if: needs.protected-paths.outputs.pr-mode == 'pm-frozen-erratum' && steps.erratum-stage.outputs.erratum_version == 'v2'
        working-directory: ${{ runner.temp }}/head_frozen_erratum
        env:
          ERRATUM_MANIFEST: ${{ steps.erratum-stage.outputs.manifest_path }}
          ERRATUM_TEST_PATH: ${{ steps.erratum-stage.outputs.test_path }}
          TRUSTED_BASE: ${{ github.workspace }}/base
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: '1'
        run: |
          python - <<'PY'
          from __future__ import annotations

          import json
          import os
          from pathlib import Path
          import subprocess
          import sys


          CHILD = r'''
          from __future__ import annotations

          import json
          import os
          from pathlib import Path

          import pytest


          class ExactOutcomes:
              def __init__(self) -> None:
                  self.collected: list[str] = []
                  self.passed: list[str] = []
                  self.failed: list[str] = []
                  self.forbidden: list[str] = []
                  self.call_node_ids: set[str] = set()

              def pytest_collection_finish(self, session: pytest.Session) -> None:
                  self.collected = [item.nodeid for item in session.items]
                  if len(set(self.collected)) != len(self.collected):
                      self.forbidden.append("duplicate-collected-node-id")

              def pytest_collectreport(self, report: pytest.CollectReport) -> None:
                  if report.outcome != "passed":
                      self.forbidden.append(f"collect-{report.outcome}:{report.nodeid}")

              def pytest_deselected(self, items: list[pytest.Item]) -> None:
                  self.forbidden.extend(f"deselected:{item.nodeid}" for item in items)

              def pytest_runtest_logreport(self, report: pytest.TestReport) -> None:
                  if getattr(report, "wasxfail", None) is not None:
                      self.forbidden.append(f"xfail-or-xpass:{report.nodeid}:{report.when}")
                  if report.when != "call":
                      if report.outcome != "passed":
                          self.forbidden.append(
                              f"non-call-{report.when}-{report.outcome}:{report.nodeid}"
                          )
                      return
                  if report.nodeid in self.call_node_ids:
                      self.forbidden.append(f"duplicate-call:{report.nodeid}")
                      return
                  self.call_node_ids.add(report.nodeid)
                  if report.outcome == "passed":
                      self.passed.append(report.nodeid)
                  elif report.outcome == "failed":
                      self.failed.append(report.nodeid)
                  else:
                      self.forbidden.append(f"call-{report.outcome}:{report.nodeid}")


          mode = os.environ["EXACT_MODE"]
          test_path = os.environ["EXACT_TEST_PATH"]
          arguments = [
              test_path,
              "-q",
              "-c",
              str(Path.cwd() / "pytest.ini"),
              f"--confcutdir={Path.cwd() / 'pm_acceptance'}",
          ]
          if mode == "collect":
              arguments.append("--collect-only")
          elif mode != "execute":
              raise SystemExit("invalid_exact_mode")
          outcomes = ExactOutcomes()
          exit_code = pytest.main(arguments, plugins=[outcomes])
          if mode == "execute":
              collected = set(outcomes.collected)
              outcomes.forbidden.extend(
                  f"missing-call:{node_id}"
                  for node_id in sorted(collected - outcomes.call_node_ids)
              )
              outcomes.forbidden.extend(
                  f"call-not-collected:{node_id}"
                  for node_id in sorted(outcomes.call_node_ids - collected)
              )
          payload = {
              "collected": outcomes.collected,
              "exit_code": int(exit_code),
              "failed": outcomes.failed,
              "forbidden": outcomes.forbidden,
              "passed": outcomes.passed,
          }
          Path(os.environ["EXACT_RESULT_PATH"]).write_text(
              json.dumps(payload, sort_keys=True, separators=(",", ":")) + "\n",
              encoding="utf-8",
          )
          '''


          def run_isolated(
              mode: str,
              suite_root: Path,
              test_path: str,
              python_path: tuple[Path, ...],
          ) -> dict[str, object]:
              result_path = Path.cwd() / f".v2-{mode}-outcomes.json"
              result_path.unlink(missing_ok=True)
              environment = dict(os.environ)
              environment.update({
                  "EXACT_MODE": mode,
                  "EXACT_RESULT_PATH": str(result_path),
                  "EXACT_TEST_PATH": test_path,
                  "PYTEST_DISABLE_PLUGIN_AUTOLOAD": "1",
                  "PYTHONPATH": os.pathsep.join(str(path) for path in python_path),
                  "RUNNER_TEMP": str(suite_root),
              })
              result = subprocess.run(
                  [sys.executable, "-c", CHILD],
                  cwd=suite_root,
                  env=environment,
                  stdout=subprocess.PIPE,
                  stderr=subprocess.PIPE,
                  text=True,
                  check=False,
              )
              if result.returncode != 0 or not result_path.is_file():
                  raise SystemExit(f"isolated_v2_{mode}_runner_failed:{result.returncode}")
              payload = json.loads(result_path.read_text(encoding="utf-8"))
              expected_keys = {"collected", "exit_code", "failed", "forbidden", "passed"}
              if not isinstance(payload, dict) or set(payload) != expected_keys:
                  raise SystemExit(f"invalid_v2_{mode}_runner_payload")
              return payload


          def checked_node_ids(payload: dict[str, object], key: str, mode: str) -> list[str]:
              value = payload[key]
              if (
                  not isinstance(value, list)
                  or any(not isinstance(item, str) or not item for item in value)
                  or len(set(value)) != len(value)
              ):
                  raise SystemExit(f"invalid_v2_{mode}_{key}")
              return value


          manifest = json.loads(Path(os.environ["ERRATUM_MANIFEST"]).read_text(encoding="utf-8"))
          if manifest.get("schema") != "pm_frozen_erratum_v2":
              raise SystemExit("invalid_v2_manifest_schema")
          expected_failed = manifest["expected_red_failed_node_ids"]
          expected_passed = manifest["expected_red_passed_node_ids"]
          expected_prefix = f"{os.environ['ERRATUM_TEST_PATH']}::"
          if (
              not isinstance(expected_failed, list)
              or not expected_failed
              or not isinstance(expected_passed, list)
              or any(not isinstance(item, str) or not item for item in expected_failed + expected_passed)
              or any(
                  not item.startswith(expected_prefix)
                  or any(ord(character) < 32 or ord(character) == 127 for character in item)
                  for item in expected_failed + expected_passed
              )
              or len(set(expected_failed + expected_passed)) != len(expected_failed + expected_passed)
          ):
              raise SystemExit("invalid_erratum_v2_expected_outcomes")

          base_suite = Path.cwd() / "base_suite"
          base_result = run_isolated(
              "collect",
              base_suite,
              os.environ["ERRATUM_TEST_PATH"],
              (base_suite, Path(os.environ["TRUSTED_BASE"])),
          )
          errors: list[str] = []
          base_collected = checked_node_ids(base_result, "collected", "base")
          base_forbidden = checked_node_ids(base_result, "forbidden", "base")
          if type(base_result["exit_code"]) is not int or base_result["exit_code"] != 0:
              errors.append(f"unexpected_v2_base_collect_exit:{base_result['exit_code']}")
          if not base_collected:
              errors.append("v2_base_collection_empty")
          if base_forbidden:
              errors.append("v2_base_forbidden_outcomes=" + ",".join(sorted(base_forbidden)))
          expected_union = expected_failed + expected_passed
          if sorted(expected_union) != sorted(base_collected):
              errors.append("v2_expected_node_ids_vs_base_collection_mismatch")

          normal_suite = Path.cwd() / "normal_suite"
          staged_scripts = normal_suite / "scripts"
          if (
              (staged_scripts / "__init__.py").read_bytes() != b""
              or not (staged_scripts / "check_protected_paths.py").is_file()
              or not (staged_scripts / "check_task_scope.py").is_file()
          ):
              raise SystemExit("invalid_v2_normal_staged_scripts")
          head_result = run_isolated(
              "execute",
              normal_suite,
              os.environ["ERRATUM_TEST_PATH"],
              (normal_suite,),
          )
          head_collected = checked_node_ids(head_result, "collected", "head")
          head_failed = checked_node_ids(head_result, "failed", "head")
          head_forbidden = checked_node_ids(head_result, "forbidden", "head")
          head_passed = checked_node_ids(head_result, "passed", "head")
          if type(head_result["exit_code"]) is not int or head_result["exit_code"] != 1:
              errors.append(f"unexpected_v2_head_pytest_exit:{head_result['exit_code']}")
          if head_forbidden:
              errors.append("v2_forbidden_outcomes=" + ",".join(sorted(head_forbidden)))
          if sorted(head_collected) != sorted(base_collected):
              errors.append("v2_head_vs_base_collection_mismatch")
          if sorted(head_failed + head_passed) != sorted(base_collected):
              errors.append("v2_head_outcome_union_vs_base_collection_mismatch")
          if sorted(head_failed) != sorted(expected_failed):
              errors.append("v2_failed_node_ids_mismatch")
          if sorted(head_passed) != sorted(expected_passed):
              errors.append("v2_passed_node_ids_mismatch")
          if errors:
              raise SystemExit(";".join(errors))
          print(
              json.dumps(
                  {
                      "baseline_collected_count": len(base_collected),
                      "failed_node_ids": sorted(head_failed),
                      "passed_node_ids": sorted(head_passed),
                      "status": "exact-v2-red-manifest-matched",
                  },
                  sort_keys=True,
                  separators=(",", ":"),
              )
          )
          PY
      - name: Run supplemental PR checks
        working-directory: head
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_MODE: ${{ needs.protected-paths.outputs.pr-mode }}
        run: |
          python scripts/check_numeric_environment.py
          python -m pip check
          python scripts/check_no_live_execution.py
          python -m compileall -q src tests scripts
          if [ "$PR_MODE" = "pm-task-definition" ] || [ "$PR_MODE" = "pm-frozen-erratum" ]; then
            python -m pytest tests -q
          else
            python -m pytest -q
          fi
          ruff check .
          git diff --check "$BASE_SHA"..."$HEAD_SHA"

  status-final:
    name: publish pm-acceptance result
    if: ${{ always() }}
    needs: [status-pending, protected-paths, acceptance]
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      statuses: write
    steps:
      - name: Publish final aggregate status
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPOSITORY: ${{ github.repository }}
          API_URL: ${{ github.api_url }}
          SERVER_URL: ${{ github.server_url }}
          RUN_ID: ${{ github.run_id }}
          PENDING_RESULT: ${{ needs.status-pending.result }}
          PROTECTED_RESULT: ${{ needs.protected-paths.result }}
          ACCEPTANCE_RESULT: ${{ needs.acceptance.result }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_DRAFT: ${{ github.event.pull_request.draft }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import urllib.request

          sha = os.environ["HEAD_SHA"]
          if os.environ["REPOSITORY"] != "brullik/bybit-grid-research":
              raise SystemExit("invalid_repository")
          if re.fullmatch(r"[0-9a-f]{40}", sha) is None:
              raise SystemExit("invalid_head_sha")
          results = {
              "pending": os.environ["PENDING_RESULT"],
              "protected": os.environ["PROTECTED_RESULT"],
              "acceptance": os.environ["ACCEPTANCE_RESULT"],
          }
          upstream_success = all(result == "success" for result in results.values())
          ready = os.environ["PR_DRAFT"] == "false"
          owner_authored = os.environ["PR_AUTHOR"] == "brullik"
          non_probe = not os.environ["HEAD_REF"].startswith("probe/")
          successful = upstream_success and ready and owner_authored and non_probe
          if successful:
              state = "success"
          elif upstream_success or any(result == "failure" for result in results.values()):
              state = "failure"
          else:
              state = "error"
          results.update({
              "ready": str(ready).lower(),
              "owner": str(owner_authored).lower(),
              "non_probe": str(non_probe).lower(),
          })
          summary = ", ".join(f"{name}={result}" for name, result in results.items())
          payload = {
              "state": state,
              "target_url": (
                  f'{os.environ["SERVER_URL"]}/{os.environ["REPOSITORY"]}'
                  f'/actions/runs/{os.environ["RUN_ID"]}'
              ),
              "description": summary[:140],
              "context": "pm-acceptance",
          }
          request = urllib.request.Request(
              f'{os.environ["API_URL"]}/repos/{os.environ["REPOSITORY"]}/statuses/{sha}',
              data=json.dumps(payload, separators=(",", ":")).encode(),
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f'Bearer {os.environ["GH_TOKEN"]}',
                  "X-GitHub-Api-Version": "2022-11-28",
              },
              method="POST",
          )
          with urllib.request.urlopen(request, timeout=30) as response:
              if response.status != 201:
                  raise SystemExit(f"status_publish_failed:{response.status}")
          if not successful:
              raise SystemExit("pm_acceptance_failed")
          PY
